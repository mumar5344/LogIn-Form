<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Data Form</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      height: 100dvh;
      overflow: hidden;
      background: linear-gradient(45deg, violet, cyan);
      background-repeat: no-repeat;
    }
    h2{
      margin: 21.33px 0 0 0;
    }
    #dataForm{
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: rgb(255, 255, 255, 0.2);
      backdrop-filter: blur(12px) saturate(180%);
      height: 530px;
      width: 450px;
      padding: 0 20px;
      gap: 10px;
      border: 1px solid white;
      border-radius: 20px;
      box-shadow: 0 0 10px rgb(255, 255, 255);
    }
    div{
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
    }
    label{
      font-family: monospace;
      font-size: 16px;
      color: white;
      margin: 0 0 0 5px;
      text-decoration: underline;
    }
    input, select{
      background: rgb(0, 0, 0, 0.1);
      backdrop-filter: blur(2px);
      outline: none;
      color: black;
      width: 100%;
      border: none;
      border-radius: 20px;
      box-shadow: 0 0 5px rgb(255, 255, 255);
      box-sizing: border-box;
      padding: 8px;
    }
    button{
      background: rgb(40, 167, 69, 0.5);
      backdrop-filter: blur(5px) saturate(180%);
      color: black;
      font-size: 16px;
      font-weight: bold;
      font-family: monospace;
      padding: 10px;
      border: 1px solid white;
      border-radius: 40px;
      box-shadow: 0 0 10px rgb(40, 167, 69);
      cursor: pointer;
      width: 100%;
      transition: background 0.25s;
    }
    button:hover{
      background: #218838;
    }
    p{
      margin: 0;
      height: 21.33px;
    }
  </style>
</head>
<body>
<form id="dataForm">
  <h2>User Registration</h2>
  <div class="">
    <label>Full Name</label>
    <input type="text" name="name" placeholder="Enter full name..." required>
  </div>
  <div class="">
    <label>Email</label>
    <input type="email" name="email"  placeholder="Enter Email..." required>
  </div>
  <div class="">
    <label>Phone Number</label>
    <input type="text" name="phone" placeholder="Enter Phone Number..." required>
  </div>
  <div class="">
    <label>City</label>
    <input type="text" name="city" placeholder="Enter City..." required>
  </div>
  <div class="">
    <label>Gender</label>
    <select name="gender" required>
      <option disabled selected>Select</option>
      <option value="Male">Male</option>
      <option value="Female">Female</option>
    </select>
  </div>
  <div class="">
    <label>Age</label>
    <input type="number" name="age" placeholder="Enter Age..." required>
  </div>
  <button type="submit">Submit</button>
  <p id="responseMsg"></p>
</form>
<script>
document.getElementById("dataForm").addEventListener("submit", function(e) {
  e.preventDefault();
  const formData = new FormData(this);
  const data = {};
  formData.forEach((value, key) => {
    data[key] = value;
  });
  fetch("https://umar5344.app.n8n.cloud/webhook/68a66f10-914e-4265-a723-2ce589b2ff48", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  })
  .then(response => response.json())
  .then(result => {
    document.getElementById("responseMsg").innerText = "✅ Form submitted successfully!";
    document.getElementById("dataForm").reset();
    setInterval(() => {
      document.querySelector('#responseMsg').remove();
    }, 3000)
  })
  .catch(error => {
    document.getElementById("responseMsg").innerText = "❌ Error submitting form!";
    console.error(error);
    setInterval(() => {
      document.querySelector('#responseMsg').remove();
    }, 3000)
  });
});
</script>
</body>
</html>
